name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"] # Replace with your active branch name if it's different

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1 # Uses the patch that resolves Node 20 warnings

      - name: Setup Node
        uses: actions/configure-pages@v4
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Keeps everything explicitly matched to Node 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3.0.1 # Cleaned up to fix deprecation warnings
        with:
          path: ./out # Next.js static exports output here

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
